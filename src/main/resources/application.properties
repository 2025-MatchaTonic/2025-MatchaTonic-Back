spring.application.name=2025-MatchaTonic-Back
server.servlet.encoding.force=true
server.address=0.0.0.0

# ================================
# DB ?? ??
# ================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / Hibernate ??
# ================================
spring.jpa.hibernate.ddl-auto=update      
spring.jpa.show-sql=true                  
spring.jpa.properties.hibernate.format_sql=true  
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ================================
# JWT ??
# ================================
jwt.secret=${JWT_SECRET}
# ?? ?? ?? (?? 1??: 3600000)
jwt.expiration=${JWT_EXPIRATION_TIME:3600000}

# ================================
# JSON ?? ??
# ================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul

# ================================
# OAuth2 ??
# ================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

server.forward-headers-strategy=native
# ?? ?? ???? ? ?????
spring.security.oauth2.client.registration.google.redirect-uri=https://api.promate.ai.kr/login/oauth2/code/google

# ????? ??? URL? ??? ??
external.api.fastapi.url=${AWS_AI_API_URL}
external.api.fastapi.chat-url=${AWS_AI_CHAT_URL}

# Notion OAuth
notion.oauth.client-id=${NOTION_CLIENT_ID:}
notion.oauth.client-secret=${NOTION_CLIENT_SECRET:}
notion.oauth.redirect-uri=${NOTION_REDIRECT_URI:https://api.promate.ai.kr/api/notion/oauth/callback}
notion.oauth.success-redirect=${NOTION_SUCCESS_REDIRECT:https://promate.ai.kr/?notion=connected#export-notion}
notion.oauth.failure-redirect=${NOTION_FAILURE_REDIRECT:https://promate.ai.kr/?notion=failed#export-notion}
